<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Secret Code Challenge</title>

    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="container secret-container">

        <h1>
            🔐 Secret Code Challenge
        </h1>

        <p class="message">

            Congratulations on completing
            the first challenge.

            <br><br>

            Now enter the secret code
            you discovered to unlock
            the final challenge.

        </p>

        <div class="secret-box">

            <input type="text" id="secretInput" placeholder="Enter Secret Code">

        </div>

        <button id="verifyBtn">

            Verify Code 🚀

        </button>

        <div class="secret-error" id="errorMsg">

            ❌ Wrong Secret Code

        </div>

        <div class="secret-success" id="successMsg">

            ✅ Secret Code Accepted

        </div>

    </div>

    <script src="../script.js"></script>

</body>

</html>
