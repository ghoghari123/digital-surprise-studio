<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Birthday Countdown</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;

            background:
                linear-gradient(135deg,
                    #ff758c,
                    #ff7eb3,
                    #ff9a9e);
        }

        .number {
            font-size: 180px;
            font-weight: 700;
            color: white;

            opacity: 0;
            transform: scale(.2);

            animation:
                zoom 1s forwards;
        }

        @keyframes zoom {

            0% {
                opacity: 0;
                transform: scale(.2);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                opacity: 0;
                transform: scale(1);
            }
        }

        .message {
            display: none;

            width: 80%;
            max-width: 700px;

            text-align: center;

            color: white;

            animation: fade 2s;
        }

        .message h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .message p {
            font-size: 22px;
            line-height: 1.8;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {

            margin-top: 40px;

            padding: 15px 40px;

            border: none;
            border-radius: 50px;

            background: white;
            color: #ff4d79;

            font-size: 18px;
            font-weight: 600;

            cursor: pointer;

            transition: .3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="number" id="count">3</div>

    <div class="message" id="message">

        <h1>✨ Are You Ready? ✨</h1>

        <p>
            This birthday adventure
            was specially created
            just for you ❤️
            <br><br>

            There are surprises,
            memories and challenges
            waiting for you.
            <br><br>

            Let's begin your
            Birthday Adventure 🎂
        </p>

        <button onclick="nextPage()">
            Start Adventure 🚀
        </button>

    </div>

    <script>

        const numbers = [3, 2, 1];

        let i = 0;

        function play() {

            if (i < numbers.length) {

                const el =
                    document.getElementById("count");

                el.innerHTML = numbers[i];

                el.style.animation = "none";

                void el.offsetWidth;

                el.style.animation =
                    "zoom 1s forwards";

                i++;

                setTimeout(play, 1200);
            }
            else {

                document
                    .getElementById("count")
                    .style.display = "none";

                document
                    .getElementById("message")
                    .style.display = "block";
            }
        }

        play();

        function nextPage() {

            window.location.href =
                "./wordsearch.html";
        }

    </script>

</body>

</html>
